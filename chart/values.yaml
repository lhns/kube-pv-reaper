# Override the generated resource names. nameOverride replaces the chart name in
# `<release>-<name>`; fullnameOverride replaces the whole name. e.g. with a
# release named "pv-reaper", set fullnameOverride: pv-reaper for a clean
# `pv-reaper` instead of `pv-reaper-kube-pv-reaper`.
nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/lhns/kube-pv-reaper
  # Defaults to the chart's appVersion (the image built alongside this chart).
  tag: ""
  pullPolicy: IfNotPresent

# CSI driver(s) to manage. Empty = all CSI PVs in the cluster; scope it to be safe.
# Prefer the list form (one or many):
#   drivers:
#     - cephfs.csi.ceph.com
#     - rbd.csi.ceph.com
# `driver` (singular string) is still honored when `drivers` is empty (back-compat).
drivers: []
driver: ""

# Finalizer key placed on managed Retain PVs (used to intercept PV deletion).
finalizer: pv-reaper.lhns.de/reclaim-on-delete

# Name prefix for the disposable reclaim clones.
clonePrefix: "reclaim-"

serviceAccount:
  create: true
  name: ""

rbac:
  create: true

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    memory: 64Mi

nodeSelector: {}
tolerations: []
affinity: {}
