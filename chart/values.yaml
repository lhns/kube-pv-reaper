# Override the generated resource names. nameOverride replaces the chart name in
# `<release>-<name>`; fullnameOverride replaces the whole name. e.g. with a
# release named "pv-reaper", set fullnameOverride: pv-reaper for a clean
# `pv-reaper` instead of `pv-reaper-kube-pv-reaper`.
nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/lhns/kube-pv-reaper
  # Defaults to the chart's appVersion (the image built alongside this chart).
  tag: ""
  pullPolicy: IfNotPresent

# CSI driver(s) to manage. Empty = all CSI PVs in the cluster; scope it to be safe.
# Prefer the list form (one or many):
#   drivers:
#     - cephfs.csi.ceph.com
#     - rbd.csi.ceph.com
# `driver` (singular string) is still honored when `drivers` is empty (back-compat).
drivers: []
driver: ""

# Finalizer key placed on managed Retain PVs (used to intercept PV deletion).
finalizer: pv-reaper.lhns.de/reclaim-on-delete

# Name prefix for the disposable reclaim clones.
clonePrefix: "reclaim-"

# Helm pre-delete hook. On uninstall it strips the reaper's finalizer from every
# managed PV so nothing is left stuck Terminating once the reaper is gone. It is
# best-effort and designed to NEVER block the uninstall: the container exits 0 no
# matter what (internal timeout + `|| true`, no retries), so if it can't reach the
# API the uninstall still proceeds — fall back to the manual strip loop in the
# README. Disable entirely with `cleanupHook.enabled: false`.
cleanupHook:
  enabled: true
  # Internal timeout for the strip, in seconds. When it fires the container still
  # exits 0, so a hung API call can't stall the uninstall.
  timeoutSeconds: 45
  # Job-level backstop, in seconds. Only bites if the hook pod can't be
  # scheduled/pulled; keep it comfortably above timeoutSeconds, and below your
  # Flux HelmRelease spec.uninstall.timeout.
  activeDeadlineSeconds: 120

serviceAccount:
  create: true
  name: ""

rbac:
  create: true

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    memory: 64Mi

nodeSelector: {}
tolerations: []
affinity: {}
