apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kube-pv-reaper.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kube-pv-reaper.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "kube-pv-reaper.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kube-pv-reaper.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "kube-pv-reaper.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
      containers:
        - name: reaper
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: DRIVER
              # `drivers` (list) preferred; falls back to the singular `driver`.
              value: {{ if .Values.drivers }}{{ join "," .Values.drivers | quote }}{{ else }}{{ .Values.driver | default "" | quote }}{{ end }}
            - name: FINALIZER
              value: {{ .Values.finalizer | quote }}
            - name: CLONE_PREFIX
              value: {{ .Values.clonePrefix | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
