{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kube-pv-reaper.fullname" . }}
  labels:
    {{- include "kube-pv-reaper.labels" . | nindent 4 }}
rules:
  # PVs are cluster-scoped; the reaper reads them, patches finalizers, and
  # creates the disposable Delete-policy reclaim clones.
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "watch", "update", "patch", "create"]
{{- end }}
