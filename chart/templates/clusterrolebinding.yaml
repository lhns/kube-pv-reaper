{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kube-pv-reaper.fullname" . }}
  labels:
    {{- include "kube-pv-reaper.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kube-pv-reaper.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kube-pv-reaper.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
