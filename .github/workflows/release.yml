name: release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute versions
        id: v
        run: |
          OWNER="${{ github.repository_owner }}"
          IMG="ghcr.io/${OWNER}/kube-pv-reaper"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            V="${GITHUB_REF_NAME#v}"
            echo "image_tags=${IMG}:${V},${IMG}:latest" >> "$GITHUB_OUTPUT"
            echo "chart_version=${V}" >> "$GITHUB_OUTPUT"
            echo "app_version=${V}" >> "$GITHUB_OUTPUT"
          else
            SHA="sha-$(git rev-parse --short HEAD)"
            echo "image_tags=${IMG}:${SHA}" >> "$GITHUB_OUTPUT"
            echo "chart_version=0.0.0-${SHA}" >> "$GITHUB_OUTPUT"
            echo "app_version=${SHA}" >> "$GITHUB_OUTPUT"
          fi
          echo "owner=${OWNER}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.v.outputs.image_tags }}

      - uses: azure/setup-helm@v4

      - name: Package and push chart
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
          helm package chart --version "${{ steps.v.outputs.chart_version }}" --app-version "${{ steps.v.outputs.app_version }}"
          helm push kube-pv-reaper-*.tgz "oci://ghcr.io/${{ steps.v.outputs.owner }}/charts"
